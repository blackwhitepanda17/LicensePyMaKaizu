<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PyMaKaizu License</title>
  <style>
    :root {
      --bg-1: #08111f;
      --bg-2: #0e1829;
      --bg-3: #14253d;
      --text: #edf8ff;
      --muted: #9db3c6;
      --glass: rgba(19, 30, 48, 0.48);
      --glass-2: rgba(255, 255, 255, 0.05);
      --line: rgba(151, 222, 255, 0.22);
      --line-strong: rgba(163, 232, 255, 0.6);
      --accent: #9be8ff;
      --accent-2: #92b9ff;
      --accent-3: #99f3d5;
      --shadow: rgba(0, 0, 0, 0.35);
      --card-w: 320px;
      --card-h: 250px;
      --slot-gap-x: 54px;
      --slot-gap-y: 34px;
      --board-pad: 28px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(146, 185, 255, 0.18), transparent 18%),
        radial-gradient(circle at 80% 15%, rgba(153, 243, 213, 0.12), transparent 20%),
        radial-gradient(circle at 50% 80%, rgba(155, 232, 255, 0.12), transparent 24%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      color: var(--text);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      opacity: 0.85;
      animation: orbDrift 18s ease-in-out infinite alternate;
    }

    body::before {
      background:
        radial-gradient(circle at 28% 36%, rgba(160, 214, 255, 0.15), transparent 18%),
        radial-gradient(circle at 68% 26%, rgba(153, 243, 213, 0.12), transparent 16%);
    }

    body::after {
      animation-duration: 24s;
      background:
        radial-gradient(circle at 72% 64%, rgba(146, 185, 255, 0.14), transparent 20%),
        radial-gradient(circle at 30% 75%, rgba(155, 232, 255, 0.1), transparent 18%);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
    }

    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.1;
      mix-blend-mode: soft-light;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.28) 0 1px, transparent 1px),
        radial-gradient(circle at 80% 50%, rgba(255, 255, 255, 0.12) 0 1px, transparent 1px),
        radial-gradient(circle at 35% 75%, rgba(255, 255, 255, 0.16) 0 1px, transparent 1px);
      background-size: 140px 140px, 180px 180px, 220px 220px;
      animation: grainMove 12s linear infinite;
      z-index: 1;
    }

    #intro-screen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.04), transparent 36%),
        rgba(6, 12, 22, 0.45);
      backdrop-filter: blur(10px);
      z-index: 50;
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }

    #intro-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .intro-word {
      font-size: clamp(2rem, 8vw, 5rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      text-shadow:
        0 0 18px rgba(157, 231, 255, 0.42),
        0 0 38px rgba(143, 184, 255, 0.22);
      opacity: 0;
      transform: translateY(20px) scale(0.96);
      transition: opacity 0.65s ease, transform 0.65s ease, letter-spacing 0.65s ease;
      user-select: none;
      text-align: center;
      padding: 0 20px;
    }

    .intro-word.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      letter-spacing: 0.28em;
    }

    #scene {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #scene.visible {
      opacity: 1;
    }

    #glyph-layer,
    #title-layer,
    #workspace-layer,
    #hud-layer {
      position: absolute;
      inset: 0;
    }

    #glyph-layer,
    #hud-layer {
      pointer-events: none;
    }

    #title-layer {
      z-index: 3;
    }

    #workspace-layer {
      z-index: 4;
    }

    #hud-layer {
      z-index: 5;
    }

    .bg-glyph {
      position: absolute;
      font-weight: 700;
      color: rgba(219, 241, 255, 0.16);
      text-shadow: 0 0 10px rgba(157, 231, 255, 0.1);
      animation:
        glyphFloat linear infinite,
        glyphPulse ease-in-out infinite;
      user-select: none;
      will-change: transform, opacity;
    }

    .title-measure {
      position: absolute;
      left: 50%;
      top: 12%;
      transform: translateX(-50%);
      font-size: clamp(2rem, 7vw, 4.8rem);
      font-weight: 800;
      letter-spacing: 0.14em;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      user-select: none;
    }

    .title-measure span {
      display: inline-block;
      position: relative;
    }

    .storm-letter {
      position: absolute;
      display: inline-block;
      font-size: clamp(2rem, 7vw, 4.8rem);
      font-weight: 800;
      color: #f5fbff;
      text-shadow:
        0 0 14px rgba(157, 231, 255, 0.35),
        0 0 32px rgba(143, 184, 255, 0.2);
      transition:
        left 1.6s cubic-bezier(0.18, 0.88, 0.18, 1),
        top 1.6s cubic-bezier(0.18, 0.88, 0.18, 1),
        transform 1.6s cubic-bezier(0.18, 0.88, 0.18, 1),
        opacity 1.2s ease;
      user-select: none;
      white-space: pre;
      will-change: left, top, transform, opacity;
    }

    .storm-letter.locked {
      animation: titleBreathe 4s ease-in-out infinite;
    }

    .subtitle-panel {
      position: absolute;
      left: 50%;
      top: calc(12% + clamp(3.8rem, 8vw, 6rem));
      transform: translateX(-50%);
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(160, 196, 255, 0.12);
      backdrop-filter: blur(14px);
      color: var(--muted);
      font-size: clamp(0.76rem, 2.8vw, 0.95rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 14px 30px rgba(0, 0, 0, 0.18);
      user-select: none;
    }

    .workspace-shell {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 16px;
      height: 54vh;
      min-height: 320px;
      max-height: 470px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
        rgba(8, 15, 25, 0.34);
      border: 1px solid rgba(180, 220, 255, 0.08);
      backdrop-filter: blur(14px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 18px 50px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .workspace-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.04), transparent 10%, transparent 90%, rgba(255, 255, 255, 0.04)),
        linear-gradient(180deg, rgba(157, 231, 255, 0.035), transparent 24%);
    }

    .workspace-topbar {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid rgba(180, 220, 255, 0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
      z-index: 4;
    }

    .workspace-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .workspace-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: radial-gradient(circle, #effcff, #8de4ff);
      box-shadow: 0 0 10px rgba(157, 231, 255, 0.65);
      flex: 0 0 auto;
    }

    .workspace-title {
      font-size: 0.84rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e8f7ff;
      white-space: nowrap;
    }

    .workspace-hint {
      font-size: 0.74rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
      margin-left: 14px;
    }

    .board-viewport {
      position: absolute;
      left: 0;
      right: 0;
      top: 56px;
      bottom: 0;
      overflow-x: auto;
      overflow-y: hidden;
      z-index: 2;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: rgba(156, 224, 255, 0.35) transparent;
    }

    .board-viewport::-webkit-scrollbar {
      height: 10px;
    }

    .board-viewport::-webkit-scrollbar-track {
      background: transparent;
    }

    .board-viewport::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(156, 224, 255, 0.28);
    }

    .board-inner {
      position: relative;
      height: 100%;
      min-width: 100%;
    }

    .slot-hint {
      position: absolute;
      width: var(--card-w);
      height: var(--card-h);
      border-radius: 22px;
      border: 1px dashed rgba(160, 220, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.005));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
      pointer-events: none;
    }

    .board-svg {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
      z-index: 1;
    }

    .nodes-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .popup-node {
      position: absolute;
      width: var(--card-w);
      height: var(--card-h);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        var(--glass);
      border: 1px solid rgba(170, 220, 255, 0.14);
      backdrop-filter: blur(18px);
      box-shadow:
        0 18px 50px var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 -1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
      touch-action: none;
      user-select: none;
      transition:
        left 0.35s cubic-bezier(0.2, 0.8, 0.2, 1),
        top 0.35s cubic-bezier(0.2, 0.8, 0.2, 1),
        box-shadow 0.25s ease,
        transform 0.25s ease;
    }

    .popup-node::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(157, 231, 255, 0.05), transparent 36%, rgba(157, 249, 215, 0.04));
      pointer-events: none;
    }

    .popup-node.dragging {
      z-index: 99;
      transform: scale(1.02);
      box-shadow:
        0 28px 65px rgba(0, 0, 0, 0.42),
        0 0 0 1px rgba(157, 231, 255, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transition: none;
    }

    .popup-head {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(180, 220, 255, 0.08);
      cursor: grab;
      touch-action: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent);
    }

    .popup-head:active {
      cursor: grabbing;
    }

    .popup-title {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0;
      font-weight: 700;
      font-size: 0.96rem;
      color: #eefaff;
      letter-spacing: 0.03em;
      min-height: 24px;
    }

    .popup-title-letter {
      display: inline-block;
      transition:
        transform 0.65s cubic-bezier(0.18, 0.88, 0.18, 1),
        opacity 0.45s ease;
      will-change: transform, opacity;
    }

    .popup-tag {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.68rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #dff6ff;
      background: rgba(157, 231, 255, 0.08);
      border: 1px solid rgba(157, 231, 255, 0.12);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .popup-body {
      position: relative;
      padding: 12px 14px 14px;
      height: calc(var(--card-h) - 54px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .text-frame {
      position: relative;
      flex: 1 1 auto;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
        rgba(8, 16, 28, 0.18);
      border: 1px solid rgba(166, 214, 255, 0.08);
      overflow: hidden;
      min-height: 112px;
    }

    .text-measure {
      position: absolute;
      inset: 12px 12px auto 12px;
      visibility: hidden;
      pointer-events: none;
      white-space: normal;
      line-height: 1.65;
      font-size: 0.88rem;
      color: transparent;
    }

    .text-measure span {
      display: inline-block;
      white-space: pre;
    }

    .text-storm {
      position: absolute;
      inset: 12px;
    }

    .text-letter {
      position: absolute;
      display: inline-block;
      white-space: pre;
      line-height: 1;
      font-size: 0.88rem;
      color: #dcedf7;
      text-shadow: 0 0 10px rgba(157, 231, 255, 0.09);
      transition:
        left 0.9s cubic-bezier(0.18, 0.88, 0.18, 1),
        top 0.9s cubic-bezier(0.18, 0.88, 0.18, 1),
        transform 0.9s cubic-bezier(0.18, 0.88, 0.18, 1),
        opacity 0.6s ease;
      will-change: left, top, transform, opacity;
    }

    .popup-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.75rem;
      min-height: 20px;
    }

    .popup-foot-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .popup-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, #dffcff, #86dfff);
      box-shadow:
        0 0 10px rgba(157, 231, 255, 0.8),
        0 0 20px rgba(157, 231, 255, 0.3);
      flex: 0 0 auto;
    }

    .popup-foot-left span,
    .popup-foot-right {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .popup-anchor {
      position: absolute;
      width: 12px;
      height: 12px;
      right: 14px;
      top: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, #effbff 0%, #95dfff 45%, rgba(149, 223, 255, 0.15) 100%);
      box-shadow:
        0 0 12px rgba(157, 231, 255, 0.8),
        0 0 28px rgba(157, 231, 255, 0.28);
      pointer-events: none;
    }

    .wire-main {
      stroke: rgba(159, 218, 255, 0.15);
      stroke-width: 2.4;
      fill: none;
      stroke-linecap: round;
    }

    .wire-glow {
      stroke: rgba(168, 232, 255, 0.68);
      stroke-width: 1.15;
      fill: none;
      stroke-linecap: round;
      stroke-dasharray: 10 12;
      filter: drop-shadow(0 0 7px rgba(157, 231, 255, 0.42));
    }

    .wire-node {
      fill: rgba(216, 245, 255, 0.85);
      filter: drop-shadow(0 0 8px rgba(157, 231, 255, 0.78));
    }

    .wire-pulse {
      fill: rgba(213, 250, 255, 0.9);
      filter: drop-shadow(0 0 8px rgba(157, 231, 255, 0.9));
    }

    .wire-spark {
      fill: rgba(157, 249, 215, 0.86);
      filter: drop-shadow(0 0 8px rgba(157, 249, 215, 0.9));
    }

    .corner-note {
      position: absolute;
      left: 16px;
      top: 16px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.76rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(170, 220, 255, 0.1);
      backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07);
      user-select: none;
    }

    @keyframes titleBreathe {
      0%,
      100% {
        text-shadow:
          0 0 14px rgba(157, 231, 255, 0.36),
          0 0 32px rgba(143, 184, 255, 0.18);
      }
      50% {
        text-shadow:
          0 0 20px rgba(157, 231, 255, 0.62),
          0 0 46px rgba(143, 184, 255, 0.28);
      }
    }

    @keyframes glyphFloat {
      0% {
        transform: translate3d(0, 0, 0) rotate(0deg);
      }
      50% {
        transform: translate3d(var(--dx), var(--dy), 0) rotate(90deg);
      }
      100% {
        transform: translate3d(calc(var(--dx) * -1), calc(var(--dy) * -0.65), 0) rotate(180deg);
      }
    }

    @keyframes glyphPulse {
      0%,
      100% {
        opacity: 0.08;
      }
      50% {
        opacity: 0.22;
      }
    }

    @keyframes orbDrift {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      100% {
        transform: translate3d(2%, -3%, 0) scale(1.05);
      }
    }

    @keyframes grainMove {
      0% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(-1.2%, 1.1%, 0);
      }
      100% {
        transform: translate3d(0, 0, 0);
      }
    }

    @media (max-width: 720px) {
      :root {
        --card-w: 282px;
        --card-h: 255px;
        --slot-gap-x: 34px;
        --slot-gap-y: 26px;
      }

      .workspace-shell {
        left: 8px;
        right: 8px;
        bottom: 10px;
        height: 58vh;
        min-height: 330px;
      }

      .subtitle-panel {
        top: calc(12% + clamp(4.3rem, 12vw, 6rem));
        padding: 10px 14px;
        font-size: 0.72rem;
      }

      .workspace-hint {
        max-width: 36vw;
      }

      .corner-note {
        left: 10px;
        top: 10px;
        right: 10px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="grain"></div>

    <div id="intro-screen">
      <div id="intro-word" class="intro-word"></div>
    </div>

    <div id="scene">
      <div id="glyph-layer"></div>
      <div id="title-layer"></div>
      <div id="workspace-layer"></div>
      <div id="hud-layer"></div>
    </div>
  </div>

  <script>
    class DomRefs {
      constructor() {
        this.app = document.getElementById("app");
        this.introScreen = document.getElementById("intro-screen");
        this.introWord = document.getElementById("intro-word");
        this.scene = document.getElementById("scene");
        this.glyphLayer = document.getElementById("glyph-layer");
        this.titleLayer = document.getElementById("title-layer");
        this.workspaceLayer = document.getElementById("workspace-layer");
        this.hudLayer = document.getElementById("hud-layer");
      }
    }

    class IntroSequence {
      constructor(refs) {
        this.refs = refs;
        this.words = ["License", "PyMaKaizu"];
      }

      async run() {
        for (let index = 0; index < this.words.length; index += 1) {
          await this.showWord(this.words[index], 900, 520);
        }
        this.refs.introScreen.classList.add("hidden");
      }

      async showWord(text, holdMs, fadeMs) {
        this.refs.introWord.textContent = text;
        this.refs.introWord.classList.remove("show");
        await this.sleep(80);
        this.refs.introWord.classList.add("show");
        await this.sleep(holdMs);
        this.refs.introWord.classList.remove("show");
        await this.sleep(fadeMs);
      }

      sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }
    }

    class GlyphField {
      constructor(container) {
        this.container = container;
        this.glyphs = [];
        this.charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789§¶↯✦✧✩★☆";
      }

      build(count = 90) {
        const fragment = document.createDocumentFragment();
        for (let i = 0; i < count; i += 1) {
          const glyph = document.createElement("span");
          glyph.className = "bg-glyph";
          glyph.textContent = this.charset[Math.floor(Math.random() * this.charset.length)];
          glyph.style.left = `${Math.random() * 100}%`;
          glyph.style.top = `${Math.random() * 100}%`;
          glyph.style.fontSize = `${12 + Math.random() * 20}px`;
          glyph.style.animationDuration = `${9 + Math.random() * 16}s, ${3 + Math.random() * 3}s`;
          glyph.style.animationDelay = `${Math.random() * 2}s, ${Math.random() * 1.6}s`;
          glyph.style.setProperty("--dx", `${-55 + Math.random() * 110}px`);
          glyph.style.setProperty("--dy", `${-45 + Math.random() * 90}px`);
          fragment.appendChild(glyph);
          this.glyphs.push(glyph);
        }
        this.container.appendChild(fragment);
      }
    }

    class TitleAssembler {
      constructor(container) {
        this.container = container;
        this.measure = null;
        this.letters = [];
        this.subtitle = null;
        this.text = "PyMaKaizu License";
      }

      async build() {
        this.createMeasure();
        await this.nextFrame();
        this.spawnLetters();
        await this.nextFrame();
        this.assemble();
        this.createSubtitle();
      }

      createMeasure() {
        this.measure = document.createElement("div");
        this.measure.className = "title-measure";
        const fragment = document.createDocumentFragment();

        [...this.text].forEach((char) => {
          const span = document.createElement("span");
          span.textContent = char === " " ? "\u00A0" : char;
          fragment.appendChild(span);
        });

        this.measure.appendChild(fragment);
        this.container.appendChild(this.measure);
      }

      spawnLetters() {
        const containerRect = this.container.getBoundingClientRect();
        const targets = [...this.measure.children];

        targets.forEach((targetSpan, index) => {
          const rect = targetSpan.getBoundingClientRect();
          const floating = document.createElement("span");
          floating.className = "storm-letter";
          floating.textContent = this.text[index] === " " ? "\u00A0" : this.text[index];
          floating.style.left = `${Math.random() * containerRect.width}px`;
          floating.style.top = `${Math.random() * (containerRect.height * 0.45)}px`;
          floating.style.opacity = `${0.25 + Math.random() * 0.75}`;
          floating.style.transform = `rotate(${(-220 + Math.random() * 440).toFixed(2)}deg) scale(${0.4 + Math.random() * 1.2})`;
          floating.dataset.tx = String(rect.left - containerRect.left);
          floating.dataset.ty = String(rect.top - containerRect.top);
          floating.style.transitionDelay = `${index * 28}ms`;
          this.container.appendChild(floating);
          this.letters.push(floating);
        });
      }

      assemble() {
        this.letters.forEach((letter, index) => {
          letter.style.left = `${Number(letter.dataset.tx)}px`;
          letter.style.top = `${Number(letter.dataset.ty)}px`;
          letter.style.transform = "rotate(0deg) scale(1)";
          letter.style.opacity = "1";

          setTimeout(() => {
            letter.classList.add("locked");
          }, 1600 + index * 20);
        });
      }

      createSubtitle() {
        this.subtitle = document.createElement("div");
        this.subtitle.className = "subtitle-panel";
        this.subtitle.textContent = "Floating license board • kéo ngang • chạm popup để khôi phục chữ";
        this.container.appendChild(this.subtitle);
      }

      nextFrame() {
        return new Promise((resolve) => requestAnimationFrame(resolve));
      }
    }

    class PopupTextStorm {
      constructor(frame, text) {
        this.frame = frame;
        this.text = text;
        this.measure = null;
        this.storm = null;
        this.letters = [];
        this.targets = [];
        this.state = "scrambled";
      }

      async mount() {
        this.frame.innerHTML = "";

        this.measure = document.createElement("div");
        this.measure.className = "text-measure";

        const storm = document.createElement("div");
        storm.className = "text-storm";
        this.storm = storm;

        const chars = [...this.text];
        const fragment = document.createDocumentFragment();

        chars.forEach((char) => {
          const span = document.createElement("span");
          span.textContent = char === " " ? "\u00A0" : char;
          fragment.appendChild(span);
        });

        this.measure.appendChild(fragment);
        this.frame.appendChild(this.measure);
        this.frame.appendChild(this.storm);

        await this.nextFrame();
        this.captureTargets();
        this.spawnLetters();
        this.scramble(0);
      }

      captureTargets() {
        const frameRect = this.frame.getBoundingClientRect();
        const spans = [...this.measure.children];

        this.targets = spans.map((span) => {
          const rect = span.getBoundingClientRect();
          return {
            x: rect.left - frameRect.left - 12,
            y: rect.top - frameRect.top - 12
          };
        });
      }

      spawnLetters() {
        this.storm.innerHTML = "";
        this.letters = [];
        const fragment = document.createDocumentFragment();
        const chars = [...this.text];

        chars.forEach((char, index) => {
          const letter = document.createElement("span");
          letter.className = "text-letter";
          letter.textContent = char === " " ? "\u00A0" : char;
          letter.dataset.index = String(index);
          fragment.appendChild(letter);
          this.letters.push(letter);
        });

        this.storm.appendChild(fragment);
      }

      scramble(delayBase = 0) {
        const stormRect = this.storm.getBoundingClientRect();
        const maxX = Math.max(8, stormRect.width - 18);
        const maxY = Math.max(8, stormRect.height - 22);
        this.state = "scrambled";

        this.letters.forEach((letter, index) => {
          const isSpace = this.text[index] === " ";
          const x = Math.random() * maxX;
          const y = Math.random() * maxY;
          letter.style.transitionDelay = `${delayBase + index * 7}ms`;
          letter.style.left = `${x}px`;
          letter.style.top = `${y}px`;
          letter.style.transform = `rotate(${(-140 + Math.random() * 280).toFixed(2)}deg) scale(${0.7 + Math.random() * 0.9})`;
          letter.style.opacity = isSpace ? "0" : `${0.45 + Math.random() * 0.55}`;
        });
      }

      restore(delayBase = 0) {
        this.state = "restored";

        this.letters.forEach((letter, index) => {
          const target = this.targets[index];
          letter.style.transitionDelay = `${delayBase + index * 9}ms`;
          letter.style.left = `${target.x}px`;
          letter.style.top = `${target.y}px`;
          letter.style.transform = "rotate(0deg) scale(1)";
          letter.style.opacity = this.text[index] === " " ? "0" : "1";
        });
      }

      nextFrame() {
        return new Promise((resolve) => requestAnimationFrame(resolve));
      }
    }

    class PopupNode {
      constructor(layer, config, board) {
        this.layer = layer;
        this.config = config;
        this.board = board;
        this.element = null;
        this.head = null;
        this.title = null;
        this.anchor = null;
        this.slotIndex = -1;
        this.position = { x: 0, y: 0 };
        this.titleLetters = [];
        this.textStorm = null;
        this.drag = {
          active: false,
          pointerId: null,
          offsetX: 0,
          offsetY: 0
        };
        this.boundDown = this.onPointerDown.bind(this);
        this.boundMove = this.onPointerMove.bind(this);
        this.boundUp = this.onPointerUp.bind(this);
        this.boundClick = this.onClick.bind(this);
      }

      async mount() {
        this.element = document.createElement("div");
        this.element.className = "popup-node";

        this.head = document.createElement("div");
        this.head.className = "popup-head";

        this.title = document.createElement("div");
        this.title.className = "popup-title";
        this.buildAnimatedTitle(this.config.title);

        const tag = document.createElement("div");
        tag.className = "popup-tag";
        tag.textContent = this.config.tag;

        this.head.appendChild(this.title);
        this.head.appendChild(tag);

        const body = document.createElement("div");
        body.className = "popup-body";

        const textFrame = document.createElement("div");
        textFrame.className = "text-frame";

        const foot = document.createElement("div");
        foot.className = "popup-foot";

        const left = document.createElement("div");
        left.className = "popup-foot-left";

        const dot = document.createElement("div");
        dot.className = "popup-dot";

        const hint = document.createElement("span");
        hint.textContent = "Chạm để khôi phục chữ";

        left.appendChild(dot);
        left.appendChild(hint);

        const right = document.createElement("div");
        right.className = "popup-foot-right";
        right.textContent = "Snap an toàn";

        foot.appendChild(left);
        foot.appendChild(right);

        this.anchor = document.createElement("div");
        this.anchor.className = "popup-anchor";

        body.appendChild(textFrame);
        body.appendChild(foot);

        this.element.appendChild(this.head);
        this.element.appendChild(body);
        this.element.appendChild(this.anchor);

        this.layer.appendChild(this.element);
        this.bind();

        this.textStorm = new PopupTextStorm(textFrame, this.config.text);
        await this.textStorm.mount();
        this.titleRestore(60);
      }

      buildAnimatedTitle(text) {
        this.title.innerHTML = "";
        this.titleLetters = [];

        [...text].forEach((char) => {
          const span = document.createElement("span");
          span.className = "popup-title-letter";
          span.textContent = char === " " ? "\u00A0" : char;
          this.title.appendChild(span);
          this.titleLetters.push(span);
        });
      }

      titleRestore(baseDelay = 0) {
        this.titleLetters.forEach((letter, index) => {
          letter.style.opacity = "0.2";
          letter.style.transform = `translate(${(-18 + Math.random() * 36).toFixed(2)}px, ${(-12 + Math.random() * 24).toFixed(2)}px) rotate(${(-60 + Math.random() * 120).toFixed(2)}deg)`;

          setTimeout(() => {
            letter.style.opacity = "1";
            letter.style.transform = "translate(0px, 0px) rotate(0deg)";
          }, baseDelay + index * 24);
        });
      }

      bind() {
        this.head.addEventListener("pointerdown", this.boundDown);
        this.element.addEventListener("pointermove", this.boundMove);
        this.element.addEventListener("pointerup", this.boundUp);
        this.element.addEventListener("pointercancel", this.boundUp);
        this.element.addEventListener("click", this.boundClick);
      }

      onClick() {
        if (this.textStorm) {
          this.textStorm.restore(0);
        }
        this.titleRestore(0);
      }

      onPointerDown(event) {
        this.drag.active = true;
        this.drag.pointerId = event.pointerId;
        this.element.classList.add("dragging");
        this.element.setPointerCapture(event.pointerId);

        const rect = this.element.getBoundingClientRect();
        this.drag.offsetX = event.clientX - rect.left;
        this.drag.offsetY = event.clientY - rect.top;
        this.board.onNodeDragStart(this);
      }

      onPointerMove(event) {
        if (!this.drag.active || event.pointerId !== this.drag.pointerId) {
          return;
        }

        const point = this.board.clientToBoard(event.clientX, event.clientY);
        const x = point.x - this.drag.offsetX;
        const y = point.y - this.drag.offsetY;
        this.setPosition(x, y, false);
      }

      onPointerUp(event) {
        if (event.pointerId !== this.drag.pointerId) {
          return;
        }

        this.drag.active = false;
        this.element.classList.remove("dragging");
        try {
          this.element.releasePointerCapture(event.pointerId);
        } catch (_) {
        }
        this.board.onNodeDrop(this);
      }

      setPosition(x, y, animate = true) {
        const width = this.element.offsetWidth;
        const height = this.element.offsetHeight;
        const bounds = this.board.getBoardBounds();

        const maxX = Math.max(bounds.padding, bounds.width - width - bounds.padding);
        const maxY = Math.max(bounds.padding, bounds.height - height - bounds.padding);

        this.position.x = Math.min(Math.max(bounds.padding, x), maxX);
        this.position.y = Math.min(Math.max(bounds.padding, y), maxY);

        if (!animate) {
          this.element.style.transition = "none";
        } else {
          this.element.style.transition = "";
        }

        this.element.style.left = `${this.position.x}px`;
        this.element.style.top = `${this.position.y}px`;

        if (!animate) {
          requestAnimationFrame(() => {
            if (!this.element.classList.contains("dragging")) {
              this.element.style.transition = "";
            }
          });
        }
      }

      snapToSlot(slot) {
        this.slotIndex = slot.index;
        this.setPosition(slot.x, slot.y, true);
      }

      getAnchorPosition() {
        return {
          x: this.position.x + this.element.offsetWidth / 2,
          y: this.position.y + this.element.offsetHeight / 2
        };
      }
    }

    class BoardWorkspace {
      constructor(container, configs) {
        this.container = container;
        this.configs = configs;
        this.shell = null;
        this.topbar = null;
        this.viewport = null;
        this.inner = null;
        this.svg = null;
        this.nodesLayer = null;
        this.nodes = [];
        this.slots = [];
        this.slotHints = [];
        this.occupied = new Map();
        this.dragNode = null;
        this.boundWheel = this.onWheel.bind(this);
      }

      async mount() {
        this.buildShell();
        this.computeBoardSize();
        this.buildSlots();
        await this.buildNodes();
        this.assignInitialSlots();
        this.enableHorizontalWheel();
      }

      buildShell() {
        this.shell = document.createElement("div");
        this.shell.className = "workspace-shell";

        this.topbar = document.createElement("div");
        this.topbar.className = "workspace-topbar";
        this.topbar.innerHTML = `
          <div class="workspace-left">
            <div class="workspace-dot"></div>
            <div class="workspace-title">License Board</div>
          </div>
          <div class="workspace-hint">Kéo ngang để xem rộng hơn • kéo card để đổi chỗ</div>
        `;

        this.viewport = document.createElement("div");
        this.viewport.className = "board-viewport";

        this.inner = document.createElement("div");
        this.inner.className = "board-inner";

        this.svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        this.svg.classList.add("board-svg");

        this.nodesLayer = document.createElement("div");
        this.nodesLayer.className = "nodes-layer";

        this.inner.appendChild(this.svg);
        this.inner.appendChild(this.nodesLayer);
        this.viewport.appendChild(this.inner);
        this.shell.appendChild(this.topbar);
        this.shell.appendChild(this.viewport);
        this.container.appendChild(this.shell);
      }

      computeBoardSize() {
        const viewportWidth = window.innerWidth - 24;
        const rows = 2;
        const count = this.configs.length;
        const columns = Math.max(3, Math.ceil(count / rows) + 1);

        const cardW = this.cssNumber("--card-w");
        const cardH = this.cssNumber("--card-h");
        const gapX = this.cssNumber("--slot-gap-x");
        const gapY = this.cssNumber("--slot-gap-y");
        const pad = this.cssNumber("--board-pad");

        const width = Math.max(
          viewportWidth,
          pad * 2 + columns * cardW + (columns - 1) * gapX + 220
        );

        const height = pad * 2 + rows * cardH + (rows - 1) * gapY;

        this.inner.style.width = `${width}px`;
        this.inner.style.height = `${height}px`;
        this.svg.setAttribute("width", String(width));
        this.svg.setAttribute("height", String(height));
        this.svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      }

      buildSlots() {
        this.slotHints.forEach((hint) => hint.remove());
        this.slotHints = [];
        this.slots = [];

        const cardW = this.cssNumber("--card-w");
        const cardH = this.cssNumber("--card-h");
        const gapX = this.cssNumber("--slot-gap-x");
        const gapY = this.cssNumber("--slot-gap-y");
        const pad = this.cssNumber("--board-pad");

        const width = this.inner.clientWidth;
        const rows = 2;
        const columns = Math.max(3, Math.floor((width - pad * 2 + gapX) / (cardW + gapX)));

        let slotIndex = 0;
        for (let col = 0; col < columns; col += 1) {
          for (let row = 0; row < rows; row += 1) {
            const x = pad + col * (cardW + gapX);
            const y = pad + row * (cardH + gapY);

            if (x + cardW > width - pad + 1) {
              continue;
            }

            this.slots.push({
              index: slotIndex,
              x,
              y,
              col,
              row
            });

            const hint = document.createElement("div");
            hint.className = "slot-hint";
            hint.style.left = `${x}px`;
            hint.style.top = `${y}px`;
            this.inner.appendChild(hint);
            this.slotHints.push(hint);

            slotIndex += 1;
          }
        }
      }

      async buildNodes() {
        this.nodes = [];
        for (let i = 0; i < this.configs.length; i += 1) {
          const node = new PopupNode(this.nodesLayer, this.configs[i], this);
          await node.mount();
          this.nodes.push(node);
        }
      }

      assignInitialSlots() {
        this.occupied.clear();

        const pattern = [0, 2, 4, 1, 5, 3, 6, 7];
        this.nodes.forEach((node, index) => {
          const slot = this.slots[pattern[index] ?? index];
          if (!slot) {
            return;
          }
          node.snapToSlot(slot);
          this.occupied.set(slot.index, node);
        });
      }

      enableHorizontalWheel() {
        this.viewport.addEventListener("wheel", this.boundWheel, { passive: false });
      }

      onWheel(event) {
        if (Math.abs(event.deltaY) > Math.abs(event.deltaX)) {
          this.viewport.scrollLeft += event.deltaY;
          event.preventDefault();
        }
      }

      cssNumber(name) {
        return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name));
      }

      getBoardBounds() {
        return {
          width: this.inner.clientWidth,
          height: this.inner.clientHeight,
          padding: this.cssNumber("--board-pad")
        };
      }

      clientToBoard(clientX, clientY) {
        const viewportRect = this.viewport.getBoundingClientRect();
        return {
          x: clientX - viewportRect.left + this.viewport.scrollLeft,
          y: clientY - viewportRect.top
        };
      }

      onNodeDragStart(node) {
        this.dragNode = node;
      }

      onNodeDrop(node) {
        const targetSlot = this.findNearestSlot(node.position.x, node.position.y);
        if (!targetSlot) {
          return;
        }

        const occupant = this.occupied.get(targetSlot.index);
        const oldSlot = this.slots.find((slot) => slot.index === node.slotIndex);

        if (!occupant || occupant === node) {
          if (oldSlot) {
            this.occupied.delete(oldSlot.index);
          }
          node.snapToSlot(targetSlot);
          this.occupied.set(targetSlot.index, node);
          return;
        }

        if (oldSlot) {
          occupant.snapToSlot(oldSlot);
          this.occupied.set(oldSlot.index, occupant);
        } else {
          const free = this.findNearestFreeSlot(node.position.x, node.position.y, targetSlot.index);
          if (free) {
            occupant.snapToSlot(free);
            this.occupied.set(free.index, occupant);
          }
        }

        this.occupied.delete(targetSlot.index);
        node.snapToSlot(targetSlot);
        this.occupied.set(targetSlot.index, node);
      }

      findNearestSlot(x, y) {
        let best = null;
        let bestDist = Infinity;

        this.slots.forEach((slot) => {
          const dx = slot.x - x;
          const dy = slot.y - y;
          const dist = dx * dx + dy * dy;
          if (dist < bestDist) {
            bestDist = dist;
            best = slot;
          }
        });

        return best;
      }

      findNearestFreeSlot(x, y, excludeIndex = -1) {
        let best = null;
        let bestDist = Infinity;

        this.slots.forEach((slot) => {
          if (slot.index === excludeIndex) {
            return;
          }
          if (this.occupied.has(slot.index)) {
            return;
          }
          const dx = slot.x - x;
          const dy = slot.y - y;
          const dist = dx * dx + dy * dy;
          if (dist < bestDist) {
            bestDist = dist;
            best = slot;
          }
        });

        return best;
      }
    }

    class WireNetwork {
      constructor(svg, nodes, pairs) {
        this.svg = svg;
        this.nodes = nodes;
        this.pairs = pairs;
        this.connections = [];
        this.running = false;
        this.boundAnimate = this.animate.bind(this);
      }

      mount() {
        this.pairs.forEach((pair, index) => {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");

          const main = document.createElementNS("http://www.w3.org/2000/svg", "line");
          main.setAttribute("class", "wire-main");

          const glow = document.createElementNS("http://www.w3.org/2000/svg", "line");
          glow.setAttribute("class", "wire-glow");

          const nodeA = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          nodeA.setAttribute("class", "wire-node");
          nodeA.setAttribute("r", "2.4");

          const nodeB = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          nodeB.setAttribute("class", "wire-node");
          nodeB.setAttribute("r", "2.4");

          const pulses = [];
          for (let i = 0; i < 3; i += 1) {
            const pulse = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            pulse.setAttribute("class", i === 2 ? "wire-spark" : "wire-pulse");
            pulse.setAttribute("r", i === 2 ? "2.3" : "1.8");
            group.appendChild(pulse);
            pulses.push({
              element: pulse,
              offset: (i / 3) + index * 0.12,
              speed: 0.00023 + i * 0.00004 + index * 0.00001
            });
          }

          group.appendChild(main);
          group.appendChild(glow);
          group.appendChild(nodeA);
          group.appendChild(nodeB);

          this.svg.appendChild(group);

          this.connections.push({
            from: this.nodes[pair[0]],
            to: this.nodes[pair[1]],
            main,
            glow,
            nodeA,
            nodeB,
            pulses
          });
        });

        this.running = true;
        requestAnimationFrame(this.boundAnimate);
      }

      animate(time) {
        if (!this.running) {
          return;
        }

        this.connections.forEach((connection) => {
          const from = connection.from.getAnchorPosition();
          const to = connection.to.getAnchorPosition();

          connection.main.setAttribute("x1", from.x);
          connection.main.setAttribute("y1", from.y);
          connection.main.setAttribute("x2", to.x);
          connection.main.setAttribute("y2", to.y);

          connection.glow.setAttribute("x1", from.x);
          connection.glow.setAttribute("y1", from.y);
          connection.glow.setAttribute("x2", to.x);
          connection.glow.setAttribute("y2", to.y);

          connection.nodeA.setAttribute("cx", from.x);
          connection.nodeA.setAttribute("cy", from.y);
          connection.nodeB.setAttribute("cx", to.x);
          connection.nodeB.setAttribute("cy", to.y);

          connection.pulses.forEach((pulse) => {
            const progress = (time * pulse.speed + pulse.offset) % 1;
            const cx = from.x + (to.x - from.x) * progress;
            const cy = from.y + (to.y - from.y) * progress;
            const opacity = 0.2 + Math.sin(progress * Math.PI) * 0.9;

            pulse.element.setAttribute("cx", cx);
            pulse.element.setAttribute("cy", cy);
            pulse.element.setAttribute("opacity", opacity.toFixed(3));
          });
        });

        requestAnimationFrame(this.boundAnimate);
      }
    }

            text: "Phần mềm được cung cấp theo trạng thái hiện có. Không có cam kết tuyệt đối về tính phù hợp, tính sẵn sàng hoặc việc không phát sinh lỗi."
          },
          {
            title: "Chấm dứt hiệu lực",
            tag: "End",
            text: "Nếu vi phạm điều khoản cốt lõi của license, quyền sử dụng có thể bị dừng. Muốn tiếp tục sử dụng thì cần được cấp lại hoặc chấp thuận lại."
          }
        ];
      }

      async start() {
        this.glyphField.build(95);
        await this.intro.run();
        this.refs.scene.classList.add("visible");
        await this.titleAssembler.build();
        await this.buildWorkspace();
        this.hud.mount();
        window.addEventListener("resize", this.boundResize);
      }

      async buildWorkspace() {
        this.workspace = new BoardWorkspace(this.refs.workspaceLayer, this.popupConfigs);
        await this.workspace.mount();

        this.network = new WireNetwork(
          this.workspace.svg,
          this.workspace.nodes,
          [
            [0, 1],
            [1, 2],
            [1, 3],
            [3, 4],
            [2, 4]
          ]
        );
        this.network.mount();
      }

      async onResize() {
        if (!this.workspace) {
          return;
        }

        const oldAssignments = this.workspace.nodes.map((node) => node.slotIndex);

        this.workspace.computeBoardSize();
        this.workspace.buildSlots();
        this.workspace.occupied.clear();

        this.workspace.nodes.forEach((node, index) => {
          const targetIndex = oldAssignments[index];
          const slot = this.workspace.slots.find((item) => item.index === targetIndex) || this.workspace.slots[index];
          if (!slot) {
            return;
          }
          node.snapToSlot(slot);
          this.workspace.occupied.set(slot.index, node);
          if (node.textStorm) {
            node.textStorm.restore(0);
          }
        });
      }
    }

    new LicenseApp().start();
  </script>
</body>
</html>
